<h1>Guess The Number</h1>
<input type="number" id="input_number">
<button onclick="main()">Play</button>
<p id="right_or_wrong">You are: Right / Wrong</p>
<p id="score">Your Score: 5</p>


<script>
    //    Select All id from html 
    var number = document.getElementById("input_number");
    var right_or_wrong = document.getElementById("right_or_wrong");
    var score = document.getElementById("score")
    var total_score = 5
    // random Numebr Genrate 
    var random = Math.floor(Math.random()*10)+1
    console.log(random);
    
    function main(){
        var user_enter_number = number.value
        if(user_enter_number == random){
            right_or_wrong.textContent = "You are: Right"
            alert("Great!!!! You Win")
        }else{
            right_or_wrong.textContent = "You are: Wrong"
            total_score = total_score -1
            score.textContent = "Your Score: "+ total_score
            if(total_score == 0 ){
                alert("Your Lose")
            }
        }
    }
</script>
